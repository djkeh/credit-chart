name: Weekly Credit Chart Update

on:
  schedule:
    # 매주 월요일 오전 8시 KST (UTC 23:00 일요일)
    - cron: '0 23 * * 0'
  workflow_dispatch: # 수동 실행 기능

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script and generate Index HTML
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          # credit_chart.py 내 OUTPUT_FILE = "index.html" 설정 확인 필요
          python credit_chart.py
          
          if [ ! -f "index.html" ]; then
            echo "::error::index.html was not generated!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github, .gitignore, credit_chart.py, requirements.txt, README.md'
          keep_files: false
          user_name: 'djkeh'
          user_email: 'djkeh@gmail.com'
          commit_message: "Weekly automated update: Credit Chart"
